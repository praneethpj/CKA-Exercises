apiVersion: v1
kind: Pod
metadata:
  labels:
    run: logger
  name: logger
spec:
  volumes:
    - name: log-volume
      emptyDir: {}
  restartPolicy: Always

  initContainers:
    - name: log-agent
      image: busybox:1.36
      command: ["sh", "-c", "tail -f /var/log/app/app.log"]
      volumeMounts:
        - name: log-volume
          mountPath: /var/log/app

  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            echo "log entry $(date)" >> /var/log/app/app.log;
            sleep 3;
          done
      volumeMounts:
        - name: log-volume
          mountPath: /var/log/app
